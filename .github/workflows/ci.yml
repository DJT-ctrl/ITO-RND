name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check
        run: >-
          ruff check
          api agents config tests storage processors
          validation_pipeline feedback telemetry scrapers

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.in

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.in && "${{ matrix.python-version }}" != "3.12" ]]; then
            echo "Python 3.11: installing from requirements.in (source constraints)"
            pip install -r requirements.in
          else
            echo "Installing from pinned requirements.txt"
            pip install -r requirements.txt
          fi

      - name: Run unit tests (retry once on flake)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 5
          command: pytest -q -m "not integration"
        env:
          GEMINI_API_KEY: ci-fake-gemini-key
          GOOGLE_API_KEY: ci-fake-gemini-key
          API_AUTH_ENABLED: "false"

  integration:
    name: Docker Compose integration
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps (host-side seed + pytest)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=ito
          POSTGRES_PASSWORD=ci_test_password
          POSTGRES_DB=ito_posts
          GRAFANA_ADMIN_PASSWORD=ci_grafana_password
          GEMINI_API_KEY=ci-fake-gemini-key
          GOOGLE_API_KEY=ci-fake-gemini-key
          DATABASE_URL=postgresql://ito:ci_test_password@localhost:15432/ito_posts
          API_AUTH_ENABLED=false
          CI_INTEGRATION_STUBS=true
          CI_EVALUATE_STUB=true
          DB_HOST_PORT=15432
          API_HOST_PORT=18000
          PROMETHEUS_HOST_PORT=19090
          EOF

      - name: Build and start integration stack
        env:
          COMPOSE_PROJECT_NAME: ito-ci-integration
          POSTGRES_PASSWORD: ci_test_password
          DB_HOST_PORT: "15432"
          API_HOST_PORT: "18000"
          PROMETHEUS_HOST_PORT: "19090"
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --build db migrate api prometheus
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps

      - name: Wait for API health
        run: |
          for i in $(seq 1 36); do
            if curl -fsS http://localhost:18000/health; then
              echo
              exit 0
            fi
            sleep 5
          done
          echo "API did not become healthy in time"
          COMPOSE_PROJECT_NAME=ito-ci-integration \
            docker compose -f docker-compose.yml -f docker-compose.ci.yml logs api migrate db
          exit 1

      - name: Seed integration fixtures
        run: python scripts/integration-seed.py
        env:
          DATABASE_URL: postgresql://ito:ci_test_password@localhost:15432/ito_posts

      - name: Run integration tests
        run: >-
          pytest tests/integration -m integration -v
          --junitxml=integration-results.xml
        env:
          DATABASE_URL: postgresql://ito:ci_test_password@localhost:15432/ito_posts
          API_BASE_URL: http://localhost:18000
          PROMETHEUS_BASE_URL: http://localhost:19090
          GEMINI_API_KEY: ci-fake-gemini-key
          API_AUTH_ENABLED: "false"

      - name: Capture compose logs on failure
        if: failure()
        env:
          COMPOSE_PROJECT_NAME: ito-ci-integration
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs > compose-logs.txt
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps >> compose-logs.txt

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: |
            integration-results.xml
            compose-logs.txt
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        env:
          COMPOSE_PROJECT_NAME: ito-ci-integration
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
