name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check
        run: >-
          ruff check
          api agents config tests storage processors
          validation_pipeline feedback telemetry scrapers

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.in

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.in && "${{ matrix.python-version }}" != "3.12" ]]; then
            echo "Python 3.11: installing from requirements.in (source constraints)"
            pip install -r requirements.in
          else
            echo "Installing from pinned requirements.txt"
            pip install -r requirements.txt
          fi

      - name: Run unit tests (retry once on flake)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 5
          command: pytest -q
        env:
          GEMINI_API_KEY: ci-fake-gemini-key
          GOOGLE_API_KEY: ci-fake-gemini-key
          API_AUTH_ENABLED: "false"

  smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=ito
          POSTGRES_PASSWORD=ci_test_password
          POSTGRES_DB=ito_posts
          GRAFANA_ADMIN_PASSWORD=ci_grafana_password
          GEMINI_API_KEY=ci-fake-gemini-key
          DATABASE_URL=postgresql://ito:ci_test_password@localhost:5432/ito_posts
          API_AUTH_ENABLED=false
          EOF

      - name: Build and start API stack
        run: |
          docker compose up -d --build db migrate api
          docker compose ps

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            sleep 5
          done
          echo "API did not become healthy in time"
          docker compose logs api
          exit 1

      - name: Smoke check OpenAPI schema
        run: curl -fsS http://localhost:8000/openapi.json | python -c "import sys,json; json.load(sys.stdin)"

      - name: Tear down
        if: always()
        run: docker compose down -v
