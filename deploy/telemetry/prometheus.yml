# Prometheus scrape config for the ITO monolith stack. Mounted read-only into
# the `prometheus` service (see docker-compose.yml). All targets are reachable
# by their compose service name on the shared internal network.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scraping itself.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # App-level metrics from FastAPI (prometheus-fastapi-instrumentator on
  # /metrics): request rate, latency histograms, status codes.
  - job_name: ito-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Per-container CPU / memory / network / disk (cAdvisor).
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Host-level CPU / memory / disk / filesystem (node-exporter).
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
