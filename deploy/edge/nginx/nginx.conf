# ITO edge — Nginx main config (Web Traffic & Security Guard).
#
# This is the "origin" half of the two-hop TLS path:
#
#   Browser ──TLS──> Cloudflare edge (Universal SSL, free, auto-renewed)
#           ──TLS──> Nginx (this box, origin cert) ──HTTP──> FastAPI :8000
#
# Everything reachable from the public internet passes through here first.
# The http {} block below wires up the cross-cutting "security guard" concerns
# (real client-IP restoration, Cloudflare-only origin lockdown, rate-limit
# zones, gzip, hardened logging); the per-domain routing lives in
# conf.d/ (rendered from templates/ by the official image's envsubst step).

user  nginx;
# `auto` = one worker per CPU core. Fine for a reverse proxy; the work is I/O.
worker_processes  auto;

# Log startup/critical errors to stderr so `docker logs` / journald capture
# them; warn keeps the noise down while still surfacing upstream failures.
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Real client IP ────────────────────────────────────────────────────
    # Cloudflare terminates the browser TLS and re-originates the request, so
    # without this every request would appear to come from a Cloudflare IP.
    # set_real_ip_from <CF ranges> + CF-Connecting-IP restores the true client
    # address into $remote_addr, so logs, rate-limits and $remote_addr-based
    # rules all see the real visitor. The original TCP peer (Cloudflare) is
    # still available as $realip_remote_addr — used for the origin lockdown.
    include /etc/nginx/snippets/cloudflare-realip.conf;

    # ── Cloudflare-only origin lockdown ───────────────────────────────────
    # geo keyed on $realip_remote_addr (the *direct* TCP peer, before realip
    # rewriting) → $from_cloudflare = 1 only when the connection actually came
    # from a Cloudflare edge node. The server blocks reject everything else
    # with 403, so an attacker who discovers the origin IP can't bypass
    # Cloudflare's WAF/DDoS protection by hitting us directly.
    include /etc/nginx/snippets/cloudflare-allowlist.conf;

    # ── WebSocket / SSE upgrade passthrough ───────────────────────────────
    # "upgrade" for a WebSocket handshake; empty (NOT "close") otherwise so the
    # `keepalive` upstream pool stays reusable for normal proxied requests.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }

    # ── Logging ───────────────────────────────────────────────────────────
    # Custom format carries the Cloudflare Ray ID and the real client IP so a
    # request can be correlated across the CF dashboard and the origin logs.
    log_format  cf_main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
        'cf_ray=$http_cf_ray rt=$request_time uct=$upstream_connect_time '
        'urt=$upstream_response_time';
    access_log  /var/log/nginx/access.log  cf_main;

    # ── Transfer tuning — "catch incoming data streams cleanly" ────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;            # don't leak the Nginx version
    types_hash_max_size 2048;

    # Request-body handling. The API takes JSON drafts (post text + a little
    # metadata); 2 MB is generous while still capping abusive uploads. Buffer
    # the body to memory up to this size; larger → 413.
    client_max_body_size      2m;
    client_body_buffer_size   128k;
    client_header_timeout     15s;
    client_body_timeout       30s;
    send_timeout              30s;
    large_client_header_buffers 4 16k;

    # ── Rate-limit zones (keyed on the *real* client IP, post-realip) ──────
    # Two tiers: a tight one for the evaluation endpoints (they fan out to
    # Gemini and cost money per call) and a looser one for everything else.
    # `nodelay` lets short bursts through but throttles sustained abuse.
    limit_req_zone  $binary_remote_addr  zone=api_general:10m  rate=20r/s;
    limit_req_zone  $binary_remote_addr  zone=api_expensive:10m rate=2r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr  zone=conn_per_ip:10m;
    limit_conn_status 429;

    # ── gzip ──────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # ── SSL defaults (applied by every server that terminates TLS) ─────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Per-domain routing.
    include /etc/nginx/conf.d/*.conf;
}
