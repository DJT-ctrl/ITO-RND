# Response security headers — included per HTTPS server block.
#
# `always` = send even on 4xx/5xx error responses (default only adds them on
# 2xx/3xx). Cloudflare will pass these through to the browser.

# Force HTTPS for two years, including subdomains, and allow preload-list
# submission. Only meaningful once the domain is reliably HTTPS end-to-end
# (Cloudflare "Always Use HTTPS" + a valid origin cert), so it lives here at
# the origin rather than being duplicated by a CF Transform Rule.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Don't let browsers MIME-sniff responses into a different content type.
add_header X-Content-Type-Options "nosniff" always;

# This is a JSON API with no first-party HTML UI meant to be framed; deny
# framing outright to kill clickjacking.
add_header X-Frame-Options "DENY" always;

# Send only the origin (not the full path/query) as the referrer cross-site.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Minimal CSP for an API surface: block plugins/framing, disallow being
# embedded. (The Swagger /docs UI at FastAPI loads its assets from a CDN; if
# you expose /docs publicly and it breaks, relax this for that location only.)
add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;

# Drop legacy powerful features no API client needs.
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
