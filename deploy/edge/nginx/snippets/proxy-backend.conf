# Shared reverse-proxy directives — included inside each upstream location.
#
# Forwards the request to the app while preserving the client's identity and
# the fact that the browser hop was HTTPS (Cloudflare → this box → app is
# plain HTTP over the loopback/compose network, so the app must learn the
# original scheme from headers, not from its own listener).

proxy_http_version 1.1;

# Identity / scheme forwarding. $remote_addr is already the real visitor IP
# here (restored by the realip module from CF-Connecting-IP).
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  443;
# Pass Cloudflare's context through so the app can log/trace it.
proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
proxy_set_header CF-Ray            $http_cf_ray;
proxy_set_header CF-IPCountry      $http_cf_ipcountry;

# WebSocket / SSE upgrade (harmless for plain HTTP requests).
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Don't buffer the whole upstream response before sending — keeps streaming
# (SSE, chunked JSON) flowing and lowers time-to-first-byte.
proxy_buffering    off;
proxy_request_buffering off;

# The /api/v1/evaluate endpoint fans out to Gemini and can take a while;
# give upstream calls room without letting a hung backend pin a worker forever.
proxy_connect_timeout 5s;
proxy_send_timeout    120s;
proxy_read_timeout    120s;

# Retry the next upstream on a dead/refused connection (matters once there's
# more than one API replica; harmless with one).
proxy_next_upstream error timeout http_502 http_503 http_504;
