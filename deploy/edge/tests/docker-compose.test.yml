# Self-contained harness for the edge layer. Stands up the REAL Nginx config
# (nginx.conf + templates + security/proxy snippets — verbatim) in front of a
# mock upstream, on a private network with a simulated Cloudflare client and a
# simulated direct-to-origin attacker. Only the two IP-list snippets are
# swapped for test ranges (see test-realip.conf / test-allowlist.conf) so the
# harness can run without the real internet.
#
# Driven by tests/test-edge.sh — not meant to be run by hand.
name: ito-edge-test

networks:
  edgenet:
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  # Stand-in for the FastAPI `api` service.
  mock-api:
    image: nginx:1.27-alpine
    volumes:
      - ./mock-upstream.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      edgenet:
        ipv4_address: 172.28.1.10

  # The system under test: the real edge config.
  edge:
    image: nginx:1.27-alpine
    depends_on:
      - mock-api
    environment:
      SERVER_NAME: localhost
      UPSTREAM_API: mock-api:80
      TLS_CERT: /etc/nginx/certs/fullchain.pem
      TLS_KEY: /etc/nginx/certs/privkey.pem
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      # Swap only the IP-list snippets for test ranges (same mechanism).
      - ./test-realip.conf:/etc/nginx/snippets/cloudflare-realip.conf:ro
      - ./test-allowlist.conf:/etc/nginx/snippets/cloudflare-allowlist.conf:ro
      - ../nginx/templates:/etc/nginx/templates:ro
      - ../certs:/etc/nginx/certs:ro
      - ./acme-webroot:/var/www/certbot:ro
    tmpfs:
      - /etc/nginx/conf.d
    networks:
      edgenet:
        ipv4_address: 172.28.1.5

  # Simulated Cloudflare edge (in the allowed range).
  cf:
    image: curlimages/curl:latest
    entrypoint: ["sh", "-c", "sleep 3600"]
    depends_on:
      - edge
    networks:
      edgenet:
        ipv4_address: 172.28.5.10

  # Simulated attacker connecting straight to the origin IP (NOT in range).
  attacker:
    image: curlimages/curl:latest
    entrypoint: ["sh", "-c", "sleep 3600"]
    depends_on:
      - edge
    networks:
      edgenet:
        ipv4_address: 172.28.9.10
