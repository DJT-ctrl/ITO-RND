# Mock FastAPI upstream for the edge test harness. Stands in for the real
# `api` service so the tests exercise the Nginx edge in isolation (no Postgres,
# Gemini keys, or embeddings needed). Echoes back the identity headers the edge
# injects so the test can assert real-client-IP restoration.

server {
    listen 80 default_server;
    server_name _;

    # Echo what the edge forwarded so the test can verify header propagation.
    add_header X-Mock-Upstream "1" always;
    add_header X-Echo-Real-IP  $http_x_real_ip always;
    add_header X-Echo-CF-IP    $http_cf_connecting_ip always;
    add_header X-Echo-XFP      $http_x_forwarded_proto always;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","mock":true}';
    }

    # The app exposes /metrics, but the edge must block it before it ever
    # reaches here. If the test ever sees this body, the edge failed to block.
    location = /metrics {
        default_type text/plain;
        return 200 "mock_metric 1\n";
    }

    location / {
        default_type application/json;
        return 200 '{"mock":true,"path":"$uri"}';
    }
}
