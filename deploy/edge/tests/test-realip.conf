# TEST-ONLY real-IP snippet. Same directives as the production
# cloudflare-realip.conf, but trusts the test harness's simulated-Cloudflare
# subnet (172.28.5.0/24) instead of the real Cloudflare ranges — so the tests
# can run on a private Docker network while exercising the identical realip
# mechanism. The production config trusts the real CF ranges.
set_real_ip_from 172.28.5.0/24;
real_ip_header    CF-Connecting-IP;
real_ip_recursive on;
