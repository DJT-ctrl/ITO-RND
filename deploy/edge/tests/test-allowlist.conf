# TEST-ONLY origin-lockdown snippet. Same geo mechanism as the production
# cloudflare-allowlist.conf (keyed on $realip_remote_addr = the true TCP peer),
# but the "allowed" set is the test harness's simulated-Cloudflare subnet. The
# `cf` client (172.28.5.10) is allowed; the `attacker` client (172.28.9.10) is
# not — proving direct-to-origin connections are rejected even if they spoof
# the CF-Connecting-IP header.
geo $realip_remote_addr $from_cloudflare {
    default 0;
    127.0.0.1/32   1;
    ::1/128        1;
    172.28.5.0/24  1;   # simulated Cloudflare edge
}
